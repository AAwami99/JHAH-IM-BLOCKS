services:
  - type: web
    name: jhah-blocks-shared
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: CHIEF_PASSWORD
        sync: false
      - key: MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jhah-blocks-db
          property: connectionString
databases:
  - name: jhah-blocks-db
    plan: free
