name: Keep Render service awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Keep the shared resident schedule warm
        run: |
          curl --fail --silent --show-error \
            --max-time 120 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            https://jhah-blocks-shared.onrender.com/api/health
